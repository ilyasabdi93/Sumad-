name: sumad_streaming
description: SUMAD - Premium OTT Video Streaming Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_dynamic_links: ^5.4.6
  
  # Google Sign In
  google_sign_in: ^6.1.6
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.4
  wakelock_plus: ^1.1.3
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Storage & Cache
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1
  flutter_downloader: ^1.11.6
  permission_handler: ^11.2.0
  
  # UI Components
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  page_transition: ^2.1.0
  flutter_staggered_animations: ^1.1.0
  smooth_page_indicator: ^1.1.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.3.0
  glassmorphism: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^16.3.2
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  easy_localization: ^3.0.3
  
  # Utilities
  url_launcher: ^6.2.1
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  in_app_review: ^2.0.8
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  clipboard: ^0.1.3
  crypto: ^3.0.3
  vector_math: ^2.1.4
  
  # Payment
  flutter_stripe: ^9.6.0
  
  # Casting
  google_cast: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/lang/
    - assets/translations/
  
  fonts:
    - family: SumadSans
      fonts:
        - asset: assets/fonts/SumadSans-Regular.ttf
        - asset: assets/fonts/SumadSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/SumadSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/SumadSans-Light.ttf
          weight: 300
        - asset: assets/fonts/SumadSans-Medium.ttf
          weight: 500